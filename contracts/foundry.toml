[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
ffi = false
remappings = [
  "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
  "forge-std/=lib/forge-std/src/",
]

[profile.default.fuzz]
runs = 256

[rpc_endpoints]
aeneid = "${AENEID_RPC_URL}"

[etherscan]
aeneid = { key = "${ETHERSCAN_API_KEY}", url = "https://aeneid.storyscan.xyz/api" }
